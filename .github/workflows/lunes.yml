name: Captura semanal supply chain

on:
  schedule:
    # Lunes a las 07:00 hora España (06:00 UTC en horario de verano, 06:00 UTC siempre con esta config)
    # GitHub Actions usa UTC. Lunes 06:00 UTC = lunes 08:00 España en verano y 07:00 en invierno.
    # Para forzar 07:00 España todo el año hace falta lógica adicional, así que dejamos 06:00 UTC y aceptamos que en verano llegue a las 08:00.
    - cron: '0 6 * * 1'
  
  # Permite ejecutarlo a mano desde la pestaña Actions cuando queramos probar
  workflow_dispatch:

jobs:
  captura:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Necesario para que el bot pueda hacer commit del dossier
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run captura
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python captura.py
      
      - name: Commit dossier al repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dossiers/
          git diff --staged --quiet || git commit -m "Dossier $(date +'%y%m%d')"
          git push
